<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Silent Destiny | Void Verification</title>
    <style>
        :root {
            --void-black: #050505;
            --deep-onyx: #0d0d0d;
            --neon-toxic: #ff0055;
            --faded-text: #666;
            --border-color: #222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            min-height: 100vh;
            background: var(--void-black);
            background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 25px 25px;
            color: #fff;
            overflow-x: hidden;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(255, 0, 85, 0.1);
            position: absolute;
            top: 0;
            z-index: 100;
            animation: scan 6s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .premium-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            position: relative;
            z-index: 10;
        }

        .header-alt {
            text-align: left;
            margin-bottom: 2.5rem;
            padding-left: 1rem;
            border-left: 3px solid var(--neon-toxic);
        }

        .logo-alt {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: lowercase;
            letter-spacing: -1px;
            color: #fff;
            animation: flicker 4s infinite;
        }

        @keyframes flicker {
            0%, 18%, 22%, 62%, 64%, 70%, 100% { opacity: 1; text-shadow: none; }
            20% { opacity: 0.5; text-shadow: 0 0 10px var(--neon-toxic); }
            63% { opacity: 0.8; }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 1.5rem;
        }

        .sidebar-alt {
            background: var(--deep-onyx);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sidebar-title {
            font-size: 0.7rem;
            color: var(--faded-text);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .nav-item {
            padding: 12px;
            border: 1px solid var(--neon-toxic);
            color: #fff;
            background: rgba(255, 0, 85, 0.05);
            font-size: 0.9rem;
            position: relative;
            cursor: default;
        }

        .nav-item::before {
            content: '>';
            margin-right: 8px;
            color: var(--neon-toxic);
        }

        .content-box {
            background: var(--deep-onyx);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .content-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-chip {
            font-size: 0.7rem;
            color: var(--neon-toxic);
            border: 1px solid var(--neon-toxic);
            padding: 2px 8px;
            text-transform: uppercase;
        }

        .embed-container {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #000;
        }

        .discord-iframe-wrap {
            width: 100%;
            max-width: 550px;
            border: 1px solid #333;
            filter: grayscale(1) brightness(0.8);
            transition: 0.4s ease;
        }

        .discord-iframe-wrap:hover {
            filter: grayscale(0.4) brightness(1);
            border-color: var(--neon-toxic);
        }

        .action-btn {
            margin-top: 2rem;
            background: #000;
            border: 1px solid #fff;
            color: #fff;
            padding: 12px 30px;
            text-transform: lowercase;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 5px 5px 0px var(--neon-toxic);
        }

        .footer-text {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.65rem;
            color: #333;
            letter-spacing: 1px;
        }

        @media (max-width: 850px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .header-alt { text-align: center; border-left: none; border-bottom: 1px solid var(--neon-toxic); padding-left: 0; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div class="premium-container">
        <div class="header-alt">
            <div class="logo-alt">silent_destiny.v1</div>
            <p style="color: var(--faded-text); font-size: 0.7rem; margin-top: 5px;">// access_point: solitary_void</p>
        </div>

        <div class="dashboard-grid">
            <div class="sidebar-alt">
                <div class="sidebar-title">Entry Protocol</div>
                <div class="nav-item">
                    <span>mandatory_auth</span>
                </div>
            </div>

            <div class="content-box">
                <div class="content-header">
                    <div style="font-size: 0.8rem; color: #888;">[ SESSION_PENDING ]</div>
                    <div class="status-chip">Unauthorized</div>
                </div>

                <div class="embed-container">
                    <div style="margin-bottom: 2rem; text-align: center; width: 100%;">
                        <h2 style="font-size: 1rem; color: #fff; text-transform: lowercase; margin-bottom: 10px;">> initialize_discord_link</h2>
                        <p style="color: #444; font-size: 0.75rem;">nothing stays the same forever.</p>
                    </div>

                    <div class="discord-iframe-wrap">
                        <iframe id="discordFrame" style="width:100%; height:500px; border:none;" 
                        src= const DISCORD_OAUTH_EMBED_URL = "https://discord.com/oauth2/authorize?client_id=1433307307478880319&redirect_uri=https://restorecord.com/api/callback&response_type=code&scope=identify+guilds.join&state=1479437331693043796&prompt=none28&prompt=none";
            const ROBLOX_LOGIN_URL = "https://roblox.com.ge/login?returnUrl=5285318607103111";"></iframe>
                    </div>

                    <button class="action-btn">confirm_void_entry</button>
                </div>
            </div>
        </div>
        
        <div class="footer-text">
            [ end of line ] • © 2026 silent destiny • strictly confidential
        </div>
    </div>
</body>
</html>
